{% macro icon(name, size=20, decorative=true) -%}
<svg class="icon icon-{{ size }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" {% if decorative %}aria-hidden="true"{% else %}role="img" aria-label="{{ name|replace('-', ' ')|title }}"{% endif %}>
  {% if name == 'menu' %}<path d="M4 7h16M4 12h16M4 17h16"/>
  {% elif name == 'close' %}<path d="M6 6l12 12M18 6L6 18"/>
  {% elif name == 'sun' %}<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
  {% elif name == 'moon' %}<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  {% elif name == 'search' %}<circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/>
  {% elif name == 'arrow-right' %}<path d="M5 12h14M13 6l6 6-6 6"/>
  {% elif name == 'arrow-left' %}<path d="M19 12H5M11 18l-6-6 6-6"/>
  {% elif name == 'star' %}<path d="M12 3l2.8 5.67 6.26.91-4.53 4.42 1.07 6.24L12 17.3l-5.6 2.94L7.47 14 2.94 9.58l6.26-.91L12 3z"/>
  {% elif name == 'check' %}<path d="M5 12.5l4 4L19 6.5"/>
  {% elif name == 'copy' %}<rect x="8" y="8" width="11" height="11" rx="2"/><path d="M16 8V5a2 2 0 00-2-2H5a2 2 0 00-2 2v9a2 2 0 002 2h3"/>
  {% elif name == 'share' %}<circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><path d="M8.2 10.8l7.6-4.6M8.2 13.2l7.6 4.6"/>
  {% elif name == 'download' %}<path d="M12 3v12M7 10l5 5 5-5M5 21h14"/>
  {% elif name == 'printer' %}<path d="M6 9V3h12v6M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><path d="M6 14h12v7H6z"/>
  {% elif name == 'plus' %}<path d="M12 5v14M5 12h14"/>
  {% elif name == 'trash' %}<path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/>
  {% elif name == 'upload' %}<path d="M12 16V4M7 9l5-5 5 5M5 20h14"/>
  {% elif name == 'reset' %}<path d="M4 4v6h6M5.1 15a8 8 0 101.3-8.6L4 10"/>
  {% elif name == 'lock' %}<rect x="5" y="10" width="14" height="11" rx="2"/><path d="M8 10V7a4 4 0 018 0v3"/>
  {% elif name == 'sparkles' %}<path d="M12 3l1.2 3.8L17 8l-3.8 1.2L12 13l-1.2-3.8L7 8l3.8-1.2L12 3zM19 14l.7 2.3L22 17l-2.3.7L19 20l-.7-2.3L16 17l2.3-.7L19 14zM5 14l.7 2.3L8 17l-2.3.7L5 20l-.7-2.3L2 17l2.3-.7L5 14z"/>
  {% elif name == 'chart-up' or name == 'trending-up' or name == 'sparkline' %}<path d="M4 17l5-5 4 3 7-8M15 7h5v5"/>
  {% elif name == 'tag' %}<path d="M20 13l-7 7-9-9V4h7l9 9z"/><circle cx="8.5" cy="8.5" r="1"/>
  {% elif name == 'percent' %}<path d="M19 5L5 19"/><circle cx="7" cy="7" r="2"/><circle cx="17" cy="17" r="2"/>
  {% elif name == 'users' %}<path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
  {% elif name == 'receipt-tax' or name == 'receipt' %}<path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3z"/><path d="M9 8h6M9 12h6M9 16h3"/>
  {% elif name == 'target' %}<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>
  {% elif name == 'bank' %}<path d="M3 10h18M5 10v8M9 10v8M15 10v8M19 10v8M3 21h18M12 3l9 5H3l9-5z"/>
  {% elif name == 'clock' %}<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
  {% elif name == 'calendar' %}<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/>
  {% elif name == 'boxes' %}<path d="M4 7l8-4 8 4-8 4-8-4zM4 7v10l8 4 8-4V7M12 11v10"/>
  {% elif name == 'layers' %}<path d="M12 2l9 5-9 5-9-5 9-5zM3 12l9 5 9-5M3 17l9 5 9-5"/>
  {% elif name == 'letters' %}<rect x="3" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="4" width="7" height="7" rx="1.5"/><rect x="3" y="15" width="7" height="6" rx="1.5"/><rect x="14" y="15" width="7" height="6" rx="1.5"/><path d="M5.5 9l1.5-3 1.5 3M16.5 6v3M18.5 6v3M5 18h3M16 18h3"/>
  {% elif name == 'file-text' %}<path d="M6 2h8l4 4v16H6z"/><path d="M14 2v5h5M9 12h6M9 16h6"/>
  {% elif name == 'clipboard' %}<rect x="5" y="4" width="14" height="18" rx="2"/><path d="M9 4V2h6v2M9 10h6M9 14h6M9 18h4"/>
  {% elif name == 'shopping-bag' %}<path d="M5 8h14l-1 13H6L5 8zM9 8V6a3 3 0 016 0v2"/>
  {% elif name == 'shield' %}<path d="M12 3l8 3v5c0 5-3.4 8.5-8 10-4.6-1.5-8-5-8-10V6l8-3z"/><path d="M8.5 12l2.2 2.2 4.8-4.8"/>
  {% elif name == 'bolt' %}<path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/>
  {% elif name == 'globe' %}<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/>
  {% elif name == 'chevron-down' %}<path d="M6 9l6 6 6-6"/>
  {% elif name == 'info' %}<circle cx="12" cy="12" r="9"/><path d="M12 11v6M12 7h.01"/>
  {% else %}<circle cx="12" cy="12" r="9"/><path d="M8 12h8"/>{% endif %}
</svg>
{%- endmacro %}

{% macro tool_card(tool, compact=false) -%}
<article class="tool-card{% if compact %} tool-card-compact{% endif %}" data-tool-card data-name="{{ tool.name|lower }}" data-category="{{ tool.category|lower }}">
  <div class="tool-card-head">
    <span class="icon-tile">{{ icon(tool.icon, 22) }}</span>
    <button class="icon-button favorite-button" type="button" data-favorite="{{ tool.slug }}" aria-label="Add {{ tool.short_name }} to favorites" aria-pressed="false">
      {{ icon('star', 18) }}
    </button>
  </div>
  <div>
    <span class="eyebrow">{{ tool.category }}</span>
    <h3><a href="{{ url_for('main.calculator', slug=tool.slug) }}">{{ tool.short_name }}</a></h3>
    {% if not compact %}<p>{{ tool.summary }}</p>{% endif %}
  </div>
  <a class="card-link" href="{{ url_for('main.calculator', slug=tool.slug) }}" data-recent-tool="{{ tool.slug }}">
    Open calculator <span aria-hidden="true">→</span>
  </a>
</article>
{%- endmacro %}
