services:
  web:
    container_name: ozzyl-tools
    image: ozzyl-tools:${OZZYL_IMAGE_TAG:-latest}
    build:
      context: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ${OZZYL_ENV_FILE:-.env}
    volumes:
      - instance_data:/app/instance
    restart: unless-stopped

volumes:
  instance_data:
    external: true
    name: ozzyl-tools-instance
