services:
  - type: web
    name: ozzyl-tools
    runtime: docker
    healthCheckPath: /health/
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: DATABASE_URL
        sync: false
