name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-only-secret
      DATABASE_URL: sqlite:////tmp/ozzyl-ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m compileall -q app migrations tests
      - run: pytest --cov=app --cov-report=term-missing
      - run: node --check app/static/js/app.js && node --check app/static/js/calculator.js && node --check app/static/js/document.js
      - run: node --test tests/js/*.test.mjs
      - run: flask --app run:app db upgrade && flask --app run:app db check
      - run: pip-audit -r requirements.txt

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ozzyl-tools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
