name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-only-secret
      DATABASE_URL: sqlite:////tmp/ozzyl-ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m compileall -q app migrations tests
      - name: Run pytest with diagnostics
        run: |
          set -o pipefail
          pytest --cov=app --cov-report=term-missing 2>&1 | tee pytest-diagnostics.txt
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest-diagnostics.txt
      - run: node --check app/static/js/app.js && node --check app/static/js/calculator.js && node --check app/static/js/document.js && node --check app/static/js/service-worker.js
      - run: node --test tests/js/*.test.mjs
      - run: bash -n scripts/deploy-vps.sh
      - run: bash -n scripts/deploy-watch.sh
      - run: flask --app run:app db upgrade && flask --app run:app db check
      - run: pip-audit -r requirements.txt

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ozzyl-tools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Mark commit deploy-ready
        run: |
          echo "Commit $GITHUB_SHA passed all required checks."
          echo "The production VPS watcher will deploy this exact SHA."
