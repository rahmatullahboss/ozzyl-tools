name: Format guide branch

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-guides:
    if: github.head_ref == 'feat/practical-guides-content-hub' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install "ruff>=0.14,<1"
      - run: ruff format app/guide_catalog.py tests/test_guides.py
      - name: Commit formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/guide_catalog.py tests/test_guides.py
          if git diff --cached --quiet; then
            echo "Guide files are already formatted."
          else
            git commit -m "style: format practical guide content"
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi
